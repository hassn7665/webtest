// ── ComplaintsPage ── مع Supabase كامل
const ComplaintsPage=({lang})=>{
  const t=lang==='ar';
  const [form,setForm]=React.useState({full_name:'',national_id:'',governorate:'',sector:'',complaint_type:'',employer:'',description:'',contact:''});
  const [files,setFiles]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState('');
  const [done,setDone]=React.useState(null);
  const [trackCode,setTrackCode]=React.useState('');
  const [trackRes,setTrackRes]=React.useState(null);
  const [trackLoad,setTrackLoad]=React.useState(false);
  const [trackErr,setTrackErr]=React.useState('');
  const inp={width:'100%',padding:'10px 14px',border:'1.5px solid #dbd8c8',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#002623',background:'#fff',outline:'none',transition:'border-color 200ms ease'};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const foc=e=>e.target.style.borderColor='#428177';
  const blu=e=>e.target.style.borderColor='#dbd8c8';

  const uploadFiles=async(ref)=>{
    const urls=[];
    for(const file of files){
      const path=`${ref}/${Date.now()}_${file.name}`;
      const {data,error}=await db.storage.from('gftu-attachments').upload(path,file);
      if(!error&&data){const {data:pub}=db.storage.from('gftu-attachments').getPublicUrl(path);urls.push(pub.publicUrl);}
    }
    return urls;
  };

  const submit=async()=>{
    if(!form.full_name.trim()||!form.description.trim()){setErr(t?'يرجى ملء الاسم ووصف الشكوى على الأقل':'Please fill name and complaint description');return;}
    setLoading(true);setErr('');
    try{
      const ref=makeRef('GC');
      const att=files.length?await uploadFiles(ref):[];
      const {error:e}=await db.from('complaints').insert([{ref_code:ref,...form,attachments:att,status:'submitted'}]);
      if(e)throw e;
      setDone({ref});
    }catch(e){setErr(t?`خطأ في الإرسال: ${e.message}`:`Submit error: ${e.message}`);}
    finally{setLoading(false);}
  };

  const track=async()=>{
    if(!trackCode.trim())return;
    setTrackLoad(true);setTrackErr('');setTrackRes(null);
    try{
      const {data,error}=await db.from('complaints').select('*').eq('ref_code',trackCode.trim().toUpperCase()).single();
      if(error||!data)setTrackErr(t?'لم يُعثر على شكوى بهذا الرقم':'Complaint not found');
      else setTrackRes(data);
    }catch{setTrackErr(t?'حدث خطأ أثناء البحث':'Search error');}
    finally{setTrackLoad(false);}
  };

  const steps=[t?'استلام الشكوى وإعطاء رقم مرجعي':'Received & reference issued',t?'مراجعة أولية من الاتحاد':'Initial review',t?'التحقيق مع الجهة المعنية':'Investigation',t?'إصدار القرار وإخطار الشاكي':'Decision issued'];
  const stIdx={submitted:0,processing:1,investigating:2,resolved:3};

  return(
    <div style={{direction:t?'rtl':'ltr',paddingTop:'72px'}}>
      <section style={{background:'#002623',padding:'56px 32px 48px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(66,129,119,.06) 20px,rgba(66,129,119,.06) 21px)'}}/>
        <div style={{maxWidth:'1280px',margin:'0 auto',position:'relative',textAlign:'center'}}>
          <span style={{display:'inline-block',padding:'4px 18px',border:'1.5px solid #b9a779',borderRadius:'9999px',fontSize:'12px',fontWeight:600,color:'#b9a779',marginBottom:'16px',fontFamily:'Cairo,sans-serif'}}>{t?'تقديم شكوى':'File a Complaint'}</span>
          <h1 style={{fontFamily:'Cairo,sans-serif',fontWeight:900,fontSize:'48px',color:'#edebe0',margin:'0 0 10px'}}>{t?'حقوقك محفوظة معنا':'Your Rights Are Protected'}</h1>
          <p style={{fontFamily:'Cairo,sans-serif',fontSize:'16px',color:'rgba(185,167,121,.85)',margin:0}}>{t?'قدّم شكواك وتابع حالتها بكود مرجعي فوري':'Submit and track your complaint with an instant reference code'}</p>
        </div>
      </section>
      <section style={{padding:'40px 32px',background:'#edebe0'}}>
        <div style={{maxWidth:'1280px',margin:'0 auto',display:'grid',gridTemplateColumns:'3fr 2fr',gap:'32px',alignItems:'start'}}>
          <div style={{background:'#fff',borderRadius:'16px',padding:'32px',border:'1px solid #dbd8c8',boxShadow:'0 4px 20px rgba(0,38,35,.07)'}}>
            {done?(
              <div style={{textAlign:'center',padding:'32px 16px'}}>
                <div style={{width:'80px',height:'80px',background:'#d4e6e4',borderRadius:'40px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:'36px'}}>✓</div>
                <h2 style={{fontFamily:'Cairo,sans-serif',fontWeight:900,fontSize:'22px',color:'#002623',marginBottom:'12px'}}>{t?'تم تقديم شكواك بنجاح':'Complaint Submitted!'}</h2>
                <p style={{fontFamily:'Cairo,sans-serif',fontSize:'14px',color:'#988561',marginBottom:'24px'}}>{t?'احتفظ بالرقم المرجعي لمتابعة شكواك':'Keep this code to track your complaint'}</p>
                <div style={{background:'#002623',borderRadius:'12px',padding:'20px 40px',display:'inline-block',marginBottom:'24px'}}>
                  <div style={{fontFamily:'Cairo,sans-serif',fontSize:'11px',color:'#b9a779',marginBottom:'6px'}}>{t?'الرقم المرجعي':'Reference Code'}</div>
                  <div style={{fontFamily:'monospace',fontSize:'28px',fontWeight:900,color:'#edebe0',letterSpacing:'.05em'}}>{done.ref}</div>
                </div>
                <br/>
                <button onClick={()=>{setDone(null);setForm({full_name:'',national_id:'',governorate:'',sector:'',complaint_type:'',employer:'',description:'',contact:''});setFiles([]);}} style={{padding:'10px 28px',background:'#428177',color:'#edebe0',border:'none',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'14px',cursor:'pointer'}}>{t?'تقديم شكوى جديدة':'New Complaint'}</button>
              </div>
            ):(
              <>
                <h2 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'20px',color:'#002623',marginBottom:'4px'}}>{t?'تقديم شكوى جديدة':'New Complaint'}</h2>
                <p style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#988561',marginBottom:'24px'}}>{t?'ستتلقى رقماً مرجعياً فور الإرسال':'You will receive a reference code immediately'}</p>
                {err&&<div style={{background:'rgba(192,57,43,.1)',border:'1px solid #c0392b',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px',fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#c0392b'}}>{err}</div>}
                {[['الاسم الكامل *','Full Name *','full_name'],['رقم الهوية الوطنية','National ID','national_id'],['جهة العمل / اسم صاحب العمل','Employer Name','employer'],['معلومات التواصل (هاتف أو بريد)','Contact Info','contact']].map(([ar,en,k])=>(
                  <div key={k} style={{marginBottom:'14px'}}>
                    <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'5px'}}>{t?ar:en}</label>
                    <input type="text" value={form[k]} onChange={e=>setF(k,e.target.value)} style={inp} onFocus={foc} onBlur={blu}/>
                  </div>
                ))}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'14px'}}>
                  <div>
                    <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'5px'}}>{t?'المحافظة':'Governorate'}</label>
                    <select value={form.governorate} onChange={e=>setF('governorate',e.target.value)} style={{...inp,appearance:'none'}} onFocus={foc} onBlur={blu}>
                      <option value="">{t?'اختر':'Select'}</option>
                      {GOVS.map(g=><option key={g} value={g}>{g}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'5px'}}>{t?'القطاع':'Sector'}</label>
                    <select value={form.sector} onChange={e=>setF('sector',e.target.value)} style={{...inp,appearance:'none'}} onFocus={foc} onBlur={blu}>
                      <option value="">{t?'اختر':'Select'}</option>
                      {SECTORS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginBottom:'14px'}}>
                  <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'5px'}}>{t?'نوع الشكوى':'Complaint Type'}</label>

                    <option value="">{t?'اختر النوع':'Select type'}</option>
                    {(t?['انتهاك حقوق عمالية','فصل تعسفي','عدم صرف الرواتب','بيئة عمل غير آمنة','تمييز وظيفي','مضايقة في العمل','أخرى']:['Labor rights violation','Wrongful termination','Unpaid wages','Unsafe environment','Discrimination','Workplace harassment','Other']).map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:'14px'}}>
                  <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'5px'}}>{t?'تفاصيل الشكوى *':'Complaint Details *'}</label>

                  <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'8px'}}>{t?'المرفقات (اختياري)':'Attachments (optional)'}</label>
                  <label style={{display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'8px',padding:'20px',border:'2px dashed #dbd8c8',borderRadius:'10px',cursor:'pointer',background:'#f5f4ee',transition:'all 200ms ease'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#428177';e.currentTarget.style.background='rgba(66,129,119,.04)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#dbd8c8';e.currentTarget.style.background='#f5f4ee';}}>
                    <span style={{fontSize:'24px'}}>📎</span>

              <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
                <input value={trackCode} onChange={e=>setTrackCode(e.target.value)} onKeyDown={e=>e.key==='Enter'&&track()} placeholder="GC-2026-XXXXX" style={{flex:1,padding:'9px 12px',border:'1.5px solid rgba(185,167,121,.3)',borderRadius:'8px',fontFamily:'monospace',fontSize:'13px',color:'#edebe0',background:'rgba(255,255,255,.07)',outline:'none'}} onFocus={e=>e.target.style.borderColor='#b9a779'} onBlur={e=>e.target.style.borderColor='rgba(185,167,121,.3)'}/>
                <button onClick={track} disabled={trackLoad} style={{padding:'9px 16px',background:'#428177',color:'#edebe0',border:'none',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:700,cursor:'pointer'}}>{trackLoad?'...':(t?'بحث':'Search')}</button>
              </div>
              {trackErr&&<div style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#f0857a',padding:'8px',background:'rgba(192,57,43,.15)',borderRadius:'6px'}}>{trackErr}</div>}
              {trackRes&&(()=>{
                const st=STATUS_LABEL[trackRes.status]||STATUS_LABEL.submitted;
                const si=stIdx[trackRes.status]||0;
                return(
                  <div style={{marginTop:'12px',background:'rgba(255,255,255,.07)',borderRadius:'10px',padding:'16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                      <span style={{fontFamily:'monospace',fontSize:'13px',color:'rgba(237,235,224,.7)'}}>{trackRes.ref_code}</span>
                      <span style={{fontFamily:'Cairo,sans-serif',fontSize:'12px',fontWeight:700,padding:'3px 10px',borderRadius:'20px',background:st.bg,color:st.color}}>{st.ar}</span>
                    </div>
                    <div style={{fontFamily:'Cairo,sans-serif',fontSize:'14px',fontWeight:600,color:'#edebe0',marginBottom:'4px'}}>{trackRes.full_name}</div>
                    <div style={{fontFamily:'Cairo,sans-serif',fontSize:'12px',color:'rgba(185,167,121,.8)',marginBottom:'14px'}}>{new Date(trackRes.created_at).toLocaleDateString('ar-SY',{year:'numeric',month:'long',day:'numeric'})}</div>
                    <div style={{display:'flex',gap:'4px',alignItems:'center',marginBottom:'8px'}}>
                      {steps.map((s,i)=>(
                        <React.Fragment key={i}>
                          <div style={{flexShrink:0,width:'22px',height:'22px',borderRadius:'11px',background:i<=si?'#b9a779':'rgba(185,167,121,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:700,color:i<=si?'#002623':'#b9a779'}}>{i<si?'✓':i+1}</div>
                          {i<steps.length-1&&<div style={{flex:1,height:'2px',background:i<si?'#b9a779':'rgba(185,167,121,.2)'}}/>}
                        </React.Fragment>
                      ))}
                    </div>
                    <div style={{fontFamily:'Cairo,sans-serif',fontSize:'11px',color:'rgba(185,167,121,.7)',textAlign:'center'}}>{steps[si]}</div>
                    {trackRes.admin_notes&&<div style={{marginTop:'12px',background:'rgba(185,167,121,.1)',borderRadius:'8px',padding:'10px',fontFamily:'Cairo,sans-serif',fontSize:'12px',color:'#b9a779'}}><strong>{t?'ملاحظة الاتحاد:':'Note:'}</strong> {trackRes.admin_notes}</div>}
                  </div>
                );
              })()}
            </div>
            <div style={{background:'#002623',borderRadius:'16px',padding:'24px',color:'#edebe0'}}>
              <h3 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'15px',color:'#b9a779',margin:'0 0 14px'}}>{t?'إحصائية الشكاوى':'Stats'}</h3>
              {[[t?'شكاوى مقدمة':'Submitted','٢٤٨'],[t?'قيد المعالجة':'Processing','٦٧'],[t?'مُغلقة':'Resolved','١٨١']].map(([l,n],i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<2?'1px solid rgba(185,167,121,.15)':''}}><span style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'rgba(237,235,224,.75)'}}>{l}</span><span style={{fontFamily:'Cairo,sans-serif',fontSize:'22px',fontWeight:900,color:'#b9a779'}}>{n}</span></div>)}
            </div>
            <div style={{background:'#fff',borderRadius:'16px',padding:'24px',border:'1px solid #dbd8c8'}}>
              <h3 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'15px',color:'#002623',margin:'0 0 16px'}}>{t?'مراحل المعالجة':'Processing Stages'}</h3>
              {steps.map((s,i)=><div key={i} style={{display:'flex',gap:'12px',alignItems:'flex-start',marginBottom:i<steps.length-1?'14px':0}}>
                <div style={{width:'28px',height:'28px',background:i===0?'#428177':'#dbd8c8',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'12px',fontWeight:700,color:i===0?'#fff':'#988561'}}>{i+1}</div>
                <div style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#054239',lineHeight:1.5,paddingTop:'5px'}}>{s}</div>
              </div>)}
            </div>
          </div>
        </div>
      </section>
    </div>
  );
};

// ── ContactPage ── مع Supabase
const ContactPage=({lang})=>{
  const t=lang==='ar';
  const [form,setForm]=React.useState({full_name:'',contact:'',subject:'',body:''});
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState('');
  const [done,setDone]=React.useState(null);
  const inp={width:'100%',padding:'10px 14px',border:'1.5px solid #dbd8c8',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#002623',background:'#fff',outline:'none',boxSizing:'border-box',transition:'border-color 200ms ease'};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const foc=e=>e.target.style.borderColor='#428177';
  const blu=e=>e.target.style.borderColor='#dbd8c8';
  const socials=[
    {label:'Facebook',color:'#1877F2',href:'https://facebook.com',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>},
    {label:'X / Twitter',color:'#000',href:'https://x.com',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>},
    {label:'Telegram',color:'#229ED9',href:'https://t.me',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21.198 2.433a2.242 2.242 0 0 0-1.022.215l-16.5 6.75a2.25 2.25 0 0 0 .128 4.21l3.574 1.117 1.977 5.93a.75.75 0 0 0 1.184.336l2.455-2.119 3.763 2.804a2.254 2.254 0 0 0 3.516-1.406l2.75-16.5a2.25 2.25 0 0 0-1.825-2.337z"/></svg>},
    {label:'WhatsApp',color:'#25D366',href:'https://wa.me',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.089.534 4.058 1.472 5.775L.057 23.927a.5.5 0 0 0 .625.607l6.41-1.676A11.942 11.942 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.741 9.741 0 0 1-4.979-1.366l-.356-.214-3.705.97 1.003-3.595-.233-.372A9.752 9.752 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>},
  ];
  const send=async()=>{
    if(!form.full_name.trim()||!form.body.trim()){setErr(t?'يرجى ملء الاسم ونص الرسالة':'Please fill name and message');return;}
    setLoading(true);setErr('');
    try{
      const ref=makeRef('GM');
      const {error:e}=await db.from('messages').insert([{ref_code:ref,...form,status:'unread'}]);
      if(e)throw e;
      setDone({ref});
    }catch(e){setErr(t?`خطأ: ${e.message}`:`Error: ${e.message}`);}
    finally{setLoading(false);}
  };
  return(
    <div style={{direction:t?'rtl':'ltr',paddingTop:'72px'}}>
      <section style={{background:'#002623',padding:'56px 32px 48px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(66,129,119,.06) 20px,rgba(66,129,119,.06) 21px)'}}/>
        <div style={{maxWidth:'1280px',margin:'0 auto',position:'relative',textAlign:'center'}}>
          <span style={{display:'inline-block',padding:'4px 18px',border:'1.5px solid #b9a779',borderRadius:'9999px',fontSize:'12px',fontWeight:600,color:'#b9a779',marginBottom:'16px',fontFamily:'Cairo,sans-serif'}}>{t?'تواصل معنا':'Contact Us'}</span>
          <h1 style={{fontFamily:'Cairo,sans-serif',fontWeight:900,fontSize:'48px',color:'#edebe0',margin:'0 0 10px'}}>{t?'نحن هنا لخدمتكم':'We Are Here to Serve You'}</h1>
          <p style={{fontFamily:'Cairo,sans-serif',fontSize:'16px',color:'rgba(185,167,121,.85)',margin:0}}>{t?'تواصل معنا عبر القنوات الرسمية للاتحاد':'Reach us through the Federation\'s official channels'}</p>
        </div>
      </section>
      <section style={{padding:'48px 32px',background:'#edebe0'}}>
        <div style={{maxWidth:'1280px',margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 3fr',gap:'32px',alignItems:'start'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
            <div style={{background:'#fff',borderRadius:'16px',padding:'28px',border:'1px solid #dbd8c8',boxShadow:'0 2px 12px rgba(0,38,35,.06)'}}>
              <h2 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'18px',color:'#002623',margin:'0 0 20px',paddingBottom:'12px',borderBottom:'2px solid #b9a779'}}>{t?'معلومات التواصل':'Contact Information'}</h2>
              {[{icon:'📍',label:t?'العنوان':'Address',value:t?'دمشق، الجمهورية العربية السورية':'Damascus, Syrian Arab Republic'},{icon:'📞',label:t?'الهاتف':'Phone',value:'+963 11 234 5678'},{icon:'✉️',label:t?'البريد الإلكتروني':'Email',value:'info@gftu-syria.org'},{icon:'🕐',label:t?'ساعات العمل':'Working Hours',value:t?'الأحد – الخميس: ٨ص – ٤م':'Sun – Thu: 8:00am – 4:00pm'}].map((item,i)=>(
                <div key={i} style={{display:'flex',gap:'14px',alignItems:'flex-start',marginBottom:'16px'}}>
                  <div style={{width:'40px',height:'40px',background:'#d4e6e4',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0}}>{item.icon}</div>
                  <div><div style={{fontFamily:'Cairo,sans-serif',fontSize:'11px',color:'#988561',marginBottom:'2px'}}>{item.label}</div><div style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623'}}>{item.value}</div></div>
                </div>
              ))}
            </div>
            <div style={{background:'#fff',borderRadius:'16px',padding:'28px',border:'1px solid #dbd8c8',boxShadow:'0 2px 12px rgba(0,38,35,.06)'}}>
              <h2 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'18px',color:'#002623',margin:'0 0 16px'}}>{t?'تابعنا على وسائل التواصل':'Follow Us'}</h2>
              <div style={{display:'flex',flexWrap:'wrap',gap:'10px'}}>
                {socials.map(s=><a key={s.label} href={s.href} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 14px',border:'1.5px solid #dbd8c8',borderRadius:'8px',color:'#002623',textDecoration:'none',fontFamily:'Cairo,sans-serif',fontSize:'12px',fontWeight:600,background:'#f5f4ee'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=s.color;e.currentTarget.style.color=s.color;e.currentTarget.style.background='#fff';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#dbd8c8';e.currentTarget.style.color='#002623';e.currentTarget.style.background='#f5f4ee';}}><span style={{color:'inherit'}}>{s.icon}</span>{s.label}</a>)}
              </div>
            </div>
          </div>
          <div style={{background:'#fff',borderRadius:'16px',padding:'32px',border:'1px solid #dbd8c8',boxShadow:'0 4px 20px rgba(0,38,35,.07)'}}>
            {done?(
              <div style={{textAlign:'center',padding:'40px 20px'}}>
                <div style={{width:'72px',height:'72px',background:'#d4e6e4',borderRadius:'36px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:'32px'}}>✓</div>
                <h3 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'20px',color:'#002623',marginBottom:'8px'}}>{t?'تم إرسال رسالتك!':'Message Sent!'}</h3>
                <p style={{fontFamily:'Cairo,sans-serif',fontSize:'14px',color:'#988561',marginBottom:'16px'}}>{t?'سنتواصل معك في أقرب وقت ممكن':'We\'ll get back to you soon'}</p>
                <div style={{background:'#f5f4ee',borderRadius:'10px',padding:'14px 24px',display:'inline-block',marginBottom:'20px'}}>
                  <div style={{fontFamily:'Cairo,sans-serif',fontSize:'11px',color:'#988561',marginBottom:'4px'}}>{t?'رقم رسالتك المرجعي':'Message Reference'}</div>
                  <div style={{fontFamily:'monospace',fontSize:'22px',fontWeight:900,color:'#002623'}}>{done.ref}</div>
                </div>
                <br/>
                <button onClick={()=>{setDone(null);setForm({full_name:'',contact:'',subject:'',body:''}); }} style={{padding:'10px 24px',background:'#428177',color:'#edebe0',border:'none',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'14px',cursor:'pointer'}}>{t?'إرسال رسالة أخرى':'Send Another'}</button>
              </div>
            ):(
              <>
                <h2 style={{fontFamily:'Cairo,sans-serif',fontWeight:700,fontSize:'22px',color:'#002623',margin:'0 0 6px'}}>{t?'أرسل لنا رسالة':'Send Us a Message'}</h2>
                <p style={{fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#988561',margin:'0 0 24px'}}>{t?'اقتراح لتحسين العمل النقابي أو تحسين الموقع لخدمتكم':'Suggestions for improving union work or the website'}</p>
                {err&&<div style={{background:'rgba(192,57,43,.1)',border:'1px solid #c0392b',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px',fontFamily:'Cairo,sans-serif',fontSize:'13px',color:'#c0392b'}}>{err}</div>}
                {[['الاسم الكامل *','Full Name *','full_name'],['البريد الإلكتروني أو رقم الهاتف','Email or Phone','contact'],['موضوع الرسالة','Message Subject','subject']].map(([ar,en,k])=>(
                  <div key={k} style={{marginBottom:'16px'}}>
                    <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'6px'}}>{t?ar:en}</label>
                    <input type="text" value={form[k]} onChange={e=>setF(k,e.target.value)} style={inp} onFocus={foc} onBlur={blu}/>
                  </div>
                ))}
                <div style={{marginBottom:'20px'}}>
                  <label style={{display:'block',fontFamily:'Cairo,sans-serif',fontSize:'13px',fontWeight:600,color:'#002623',marginBottom:'6px'}}>{t?'تفاصيل الرسالة *':'Message Details *'}</label>
                  <textarea value={form.body} onChange={e=>setF('body',e.target.value)} rows="5" style={{...inp,resize:'vertical',minHeight:'120px'}} placeholder={t?'اكتب رسالتك هنا...':'Write your message here...'} onFocus={foc} onBlur={blu}/>
                </div>
                <button onClick={send} disabled={loading} style={{width:'100%',padding:'13px',background:loading?'#988561':'#428177',color:'#edebe0',border:'none',borderRadius:'8px',fontFamily:'Cairo,sans-serif',fontSize:'15px',fontWeight:700,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px'}} onMouseEnter={e=>{if(!loading)e.currentTarget.style.background='#054239';}} onMouseLeave={e=>{if(!loading)e.currentTarget.style.background='#428177';}}>
                  {loading?<><span className="spinner"></span>{t?'جارٍ الإرسال...':'Sending...'}</>:(t?'إرسال الرسالة':'Send Message')}
                </button>
              </>
            )}
          </div>
        </div>
      </section>
    </div>
  );
};

// ── App ──
const App=()=>{
  const [page,setPage]=React.useState('home');
  const [lang,setLang]=React.useState('ar');
  React.useEffect(()=>{document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';},[lang]);
  React.useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[page]);
  const render=()=>{
    const p={lang,setPage};
    switch(page){case 'home':return <HomePage {...p}/>;case 'news':return <NewsPage {...p}/>;case 'services':return <ServicesPage {...p}/>;case 'complaints':return <ComplaintsPage {...p}/>;case 'contact':return <ContactPage {...p}/>;default:return <HomePage {...p}/>;}
  };
  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}><Navbar page={page} setPage={setPage} lang={lang} setLang={setLang}/><main style={{flex:1}}>{render()}</main><Footer setPage={setPage} lang={lang}/></div>);
};

const ls=document.getElementById('loading-screen');
const lb=document.getElementById('loading-bar');
let prog=0;
const iv=setInterval(()=>{prog+=Math.random()*18+4;if(prog>=95){prog=95;clearInterval(iv);}lb.style.width=prog+'%';},100);
const fin=()=>{clearInterval(iv);lb.style.width='100%';setTimeout(()=>{ls.style.opacity='0';ls.style.visibility='hidden';setTimeout(()=>{if(ls.parentNode)ls.remove();},650);},300);};
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
Promise.all([new Promise(r=>setTimeout(r,1800))]).then(fin);
</script>
</body>
</html>
